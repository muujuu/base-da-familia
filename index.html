<!DOCTYPE html><html lang="pt-BR" data-theme="dark"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="theme-color" content="#11101a">
<title>Base da Família</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head><body><div class="app">
<header class="header"><div class="brand"><img src="icon-192.png" class="logo"><div><h1>Base da Família</h1><div class="sync"><span class="dot local" id="syncDot"></span><span id="syncText">modo local</span></div></div></div><div class="head-actions"><button id="notifyBtn" class="ghost small">🔔 Avisos</button><button id="themeToggle" class="ghost small">☀️ Tema</button></div></header>
<main>
<section id="screen-missoes" class="screen active"><div class="card"><div class="section-head"><h2>Missões</h2><span class="pill" id="todayDate"></span></div><div class="tabs"><button class="tab active" data-mission-view="base">Base</button><button class="tab" data-mission-view="daily">Diárias</button><button class="tab" data-mission-view="weekly">Semanais</button><button class="tab" data-mission-view="monthly">Mensais</button></div></div><div id="missionView"></div></section>
<section id="screen-base" class="screen"><div class="card center"><div class="section-head"><h2>🏡 Evolução da Base</h2><span class="pill" id="baseLevel"></span></div><div class="home" id="homeIcon">🏚️</div><h2 id="homeName"></h2><p id="homeDesc"></p><div class="progress"><div id="homeProg" class="progress-fill"></div></div></div><div class="grid3" id="dashGrid"></div><div class="card"><h2>🔥 Sequências</h2><div class="grid4" id="streakGrid"></div></div><div class="card"><h2>👤 Avatares</h2><div class="grid2" id="profileGrid"></div></div><div class="card"><h2>🏁 Competição saudável</h2><div id="competitionBox" class="list"></div></div></section>
<section id="screen-cofrinho" class="screen"><div class="card"><div class="section-head"><h2>🐷 Cofrinho</h2><button id="openGoalBtn" class="small">+ Meta</button></div><div class="grid3"><div class="stat"><strong id="saveTotal"></strong><span>guardado</span></div><div class="stat"><strong id="saveMissing"></strong><span>faltando</span></div><div class="stat"><strong id="saveCount"></strong><span>metas</span></div></div><div id="goalList" class="list"></div></div></section>
<section id="screen-hall" class="screen"><div class="card"><div class="section-head"><h2>🏆 Hall</h2><span class="pill"><span id="achCount">0</span> desbloqueadas</span></div><div id="achTabs" class="chips"></div><div id="achList" class="trophy-grid"></div></div></section>
<section id="screen-historico" class="screen"><div class="card"><div class="section-head"><h2>📜 Histórico</h2></div><div class="month"><button id="prevMonth" class="small">◀</button><strong id="monthTitle"></strong><button id="nextMonth" class="small">▶</button></div><div class="days head"><b>Seg</b><b>Ter</b><b>Qua</b><b>Qui</b><b>Sex</b><b>Sáb</b><b>Dom</b></div><div class="days" id="calendar"></div></div><div class="card"><h2>✅ Feitas</h2><div id="doneList" class="list"></div></div></section>
</main></div>
<nav class="bottom"><button class="nav active" data-screen="missoes">⚡<br>Missões</button><button class="nav" data-screen="base">📊<br>Base</button><button class="nav" data-screen="cofrinho">🐷<br>Cofrinho</button><button class="nav" data-screen="hall">🏆<br>Hall</button><button class="nav" data-screen="historico">📜<br>Histórico</button></nav>
<div id="taskModal" class="modal-bg"><div class="modal"><div class="modal-head"><h2 id="taskTitle">Nova missão</h2><button class="close" id="closeTask">✕</button></div><div class="form"><input id="taskText" placeholder="Nome da missão"><select id="taskCat"><option value="casa">🏠 Casa</option><option value="pets">🐾 Pets</option><option value="saude">🧠 Saúde</option></select><select id="taskPerson"><option>Mu</option><option>Ju</option><option>Ambos</option></select><select id="taskDiff"><option value="facil">Fácil</option><option value="media">Média</option><option value="dificil">Difícil</option><option value="muito_dificil">Muito difícil</option></select><input id="taskMin" type="number" value="5" min="1" placeholder="Minutos"><input id="taskInterval" type="number" value="1" min="1" placeholder="A cada X dias"><input id="taskMonthDay" type="number" value="1" min="1" max="31" placeholder="Dia do mês"><div id="weekdays" class="weekdays"></div><button id="saveTask">Salvar missão</button></div></div></div>
<div id="goalModal" class="modal-bg"><div class="modal"><div class="modal-head"><h2>Nova meta</h2><button class="close" id="closeGoal">✕</button></div><div class="form"><input id="goalName" placeholder="Nome da meta"><select id="goalCat"><option value="casa">🏠 Casa</option><option value="pets">🐾 Pets</option><option value="saude">🧠 Saúde</option></select><input id="goalTarget" type="number" step="0.01" min="0" placeholder="Valor alvo"><button id="saveGoal">Salvar meta</button></div></div></div>
<div id="notifyModal" class="modal-bg"><div class="modal"><div class="modal-head"><h2>🔔 Central da Base</h2><button class="close" id="closeNotify">✕</button></div><div class="notify-actions"><button id="enablePush" class="small">Ativar push real</button><button id="testLocal" class="ghost small">Teste local</button><button id="testServer" class="ghost small">Teste servidor</button></div><div id="pushStatus" class="empty"></div><div id="smartList" class="list"></div></div></div>
<script src="app.js"></script></body></html>
