<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta name="theme-color" content="#b77cff"><title>Base da Família</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body>
<div id="profileGate" class="gate hidden"><div class="modal-card center"><img src="icon-192.png" class="logo"><h1>Base da Família</h1><p>Quem está usando agora?</p><div class="row"><button data-profile="Mu">👤 Mu</button><button data-profile="Ju">👤 Ju</button></div></div></div>
<main class="app"><header class="top"><div class="brand"><img src="icon-192.png"><div><h1>Base da Família</h1><p><span id="syncDot" class="dot local"></span> <span id="syncText">modo local</span> <span id="profilePill" class="pill">sem perfil</span></p></div></div><div class="row"><button id="profileBtn" class="ghost small">👤 Perfil</button><button id="themeBtn" class="ghost small">🎨 Tema</button></div></header>
<section id="missions" class="view active"><div class="card"><div class="head"><h2>Missões</h2><span id="todayPill" class="pill">Hoje</span></div><div class="tabs"><button class="tab active" data-mv="base">Base</button><button class="tab" data-mv="daily">Diárias</button><button class="tab" data-mv="weekly">Semanais</button><button class="tab" data-mv="monthly">Mensais</button></div></div><div id="missionContent"></div></section>
<section id="base" class="view"><div class="card"><h2>📊 Base</h2><div id="baseStats" class="stats"></div></div><div class="card"><h2>🏠 Evolução</h2><div id="homeProgress"></div></div><div class="card"><h2>👥 Perfis</h2><div id="profileStats" class="profiles"></div></div></section>
<section id="finance" class="view"><div class="card"><div class="head"><h2>🐷 Cofrinho</h2><button id="goalBtn" class="small">+ Meta</button></div><div id="goalList"></div></div><div class="card"><div class="head"><h2>🍻 Álcool, maconha e delivery</h2><span id="wasteTotal" class="pill">R$ 0,00</span></div><div class="inline"><select id="wasteType"><option value="alcool">🍻 Álcool</option><option value="maconha">🌿 Maconha</option><option value="delivery">🍔 Delivery</option></select><input id="wasteAmount" type="number" step="0.01" placeholder="Valor"><button id="addWaste" class="small">Adicionar</button></div><div id="wasteStats" class="stats smallstats"></div><div id="wasteList"></div></div></section>
<section id="hall" class="view"><div class="card"><h2>🏆 Hall</h2><div id="hallStats" class="stats"></div></div><div class="card"><h2>🎖️ Conquistas</h2><div id="achievements" class="profiles"></div></div></section>
<section id="history" class="view"><div class="card"><div class="head"><button id="prevMonth" class="round">‹</button><h2 id="calTitle">Histórico</h2><button id="nextMonth" class="round">›</button></div><div id="calGrid" class="calendar"></div></div><div class="card"><div class="head"><h2>✅ Feitas</h2><button id="fixHistory" class="ghost small">Corrigir histórico</button></div><div id="doneList"></div></div></section></main>
<nav><button class="nav active" data-view="missions">⚡<span>Missões</span></button><button class="nav" data-view="base">📊<span>Base</span></button><button class="nav" data-view="finance">🐷<span>Cofrinho</span></button><button class="nav" data-view="hall">🏆<span>Hall</span></button><button class="nav" data-view="history">📜<span>Histórico</span></button></nav>
<div id="taskModal" class="modal"><div class="modal-card"><button class="close" id="closeTask">×</button><h2 id="taskTitle">Nova missão</h2><label>Nome</label><input id="taskText"><label>Sistema</label><select id="taskSystem"><option value="casa">🏠 Casa</option><option value="pets">🐾 Pets</option><option value="saude">🧠 Saúde</option><option value="relacionamento">💞 Relacionamento</option><option value="financeiro">🐷 Financeiro</option></select><div class="inline"><div><label>Dificuldade</label><select id="taskDifficulty"><option value="facil">Fácil</option><option value="media">Média</option><option value="dificil">Difícil</option><option value="muito_dificil">Muito difícil</option></select></div><div><label>Prioridade</label><select id="taskPriority"><option value="baixa">Baixa</option><option value="normal">Normal</option><option value="alta">Alta</option><option value="emergencial">Emergencial</option></select></div></div><div class="inline"><div><label>Minutos</label><input id="taskMinutes" type="number" min="1" value="5"></div><div><label>Horário</label><input id="taskTime" type="time"></div></div><div id="dailyBox"><label>Repetir a cada X dias</label><input id="taskInterval" type="number" min="1" value="1"></div><div id="weeklyBox"><label>Dias da semana</label><div id="weekdays" class="weekdays"></div></div><div id="monthlyBox"><label>Dia do mês</label><input id="taskMonthDay" type="number" min="1" max="31" value="1"></div><label>Ordem</label><select id="taskParent"><option value="">Sem dependência</option></select><button id="saveTask">Salvar missão</button><div id="dangerRow" class="danger hidden"><button id="archiveTask" class="ghost small">Arquivar/Pausar</button><button id="deleteTask" class="red small">Excluir</button></div></div></div>
<div id="goalModal" class="modal"><div class="modal-card"><button class="close" id="closeGoal">×</button><h2>Nova meta</h2><label>Nome</label><input id="goalName"><label>Valor alvo</label><input id="goalTarget" type="number" step="0.01"><label>Guardado</label><input id="goalSaved" type="number" step="0.01"><button id="saveGoal">Salvar</button></div></div>
<div id="profileModal" class="modal"><div class="modal-card center"><button class="close" id="closeProfile">×</button><h2>Perfil</h2><div class="row"><button data-profile="Mu">👤 Mu</button><button data-profile="Ju">👤 Ju</button></div></div></div>
<div id="themeModal" class="modal"><div class="modal-card"><button class="close" id="closeTheme">×</button><h2>Personalizar tema</h2><label>Modo</label><select id="themeMode"><option value="dark">Escuro</option><option value="light">Claro</option></select><label>Estilo</label><select id="themePreset"><option value="cosmic">Cósmico</option><option value="sunset">Pôr do sol</option><option value="forest">Floresta</option><option value="ocean">Oceano</option><option value="rose">Rosa</option></select><label>Cor principal</label><input id="themeAccent" type="color" value="#b77cff"><button id="saveTheme">Aplicar</button></div></div>
<script src="app.js"></script></body></html>
